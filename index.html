    <style>
        :root { --primary-blue: #003366; --accent-blue: #0056b3; --whatsapp-green: #25d366; --light-bg: #f4f7f9; --text-dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: var(--text-dark); line-height: 1.6; background-color: var(--light-bg); scroll-behavior: smooth; }
        
        header { background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue)); color: white; padding: 110px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 88%, 0% 100%); }
        header h1 { margin: 0; font-size: 3.5em; text-transform: uppercase; letter-spacing: 3px; }
        header p { font-size: 1.2em; opacity: 0.9; }

        .container { max-width: 1200px; margin: auto; padding: 60px 20px; }
        h2 { color: var(--primary-blue); font-size: 2.2em; border-left: 8px solid var(--accent-blue); padding-left: 15px; margin-bottom: 40px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-bottom: 4px solid transparent; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-bottom: 4px solid var(--accent-blue); }
        .card h3 { color: var(--accent-blue); margin-top: 0; font-size: 1.4em; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .card ul { padding-left: 20px; color: #555; font-size: 0.95em; }
        .card li { margin-bottom: 8px; }

        /* SEÇÃO DA CALCULADORA (DESTAQUE) */
        .calc-section { text-align: center; padding: 50px 20px; background: #eef4ff; border-radius: 25px; margin: 40px 0; border: 1px solid #d1e3ff; }
        .btn-calc { background: var(--primary-blue); color: white; padding: 20px 45px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2em; display: inline-block; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,51,102,0.2); }
        .btn-calc:hover { background: var(--accent-blue); transform: scale(1.05); }

        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: var(--whatsapp-green); color: white; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .whatsapp-float:hover { transform: scale(1.1); }
        .whatsapp-float svg { width: 35px; height: 35px; fill: white; }

        .form-section { background: white; padding: 45px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 60px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea, select { padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box; }
        button { background: var(--accent-blue); color: white; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: var(--primary-blue); }

        footer { text-align: center; padding: 50px; background: #1a1a1a; color: #999; margin-top: 80px; }
        footer a { color: #fff; text-decoration: none; margin: 0 10px; }
    </style>
</head>
