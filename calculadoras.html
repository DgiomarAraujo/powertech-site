<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox Técnica | PowerTech Industrial</title>
    <style>
        :root { 
            --deep-dark: #0a0e14; 
            --neon-blue: #00d2ff; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-gray: #a0aec0;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            color: #fff; 
            background: radial-gradient(circle at top right, #111827, #0a0e14);
            background-attachment: fixed;
        }

        header { 
            padding: 60px 20px; 
            text-align: center; 
            background: linear-gradient(180deg, rgba(0, 51, 102, 0.5), transparent);
        }

        header h1 { font-size: 2.5em; letter-spacing: 4px; color: var(--neon-blue); text-transform: uppercase; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }

        h2 { border-left: 4px solid var(--neon-blue); padding-left: 15px; margin-top: 40px; font-size: 1.4em; }

        .calc-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 0.9em; }
        
        input, select { 
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; 
            box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 15px; 
            background: linear-gradient(90deg, #0056b3, #00d2ff);
            border: none; border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        .result { 
            margin-top: 20px; padding: 15px; border-radius: 8px; 
            background: rgba(0, 210, 255, 0.1); color: var(--neon-blue);
            text-align: center; font-weight: bold; display: none;
        }

        .back-link { display: block; text-align: center; margin: 40px 0; color: var(--text-gray); text-decoration: none; }
        .back-link:hover { color: var(--neon-blue); }
    </style>
</head>
<body>

<header>
    <h1>Toolbox PowerTech</h1>
    <p>Dimensionamento Técnico NBR 5410</p>
</header>

<div class="container">

    <div class="calc-card">
        <h2>1. Queda de Tensão e Condutores</h2>
        <p style="color:var(--text-gray); font-size:0.9em;">Cálculo baseado na resistividade do cobre (\(\rho = 0,0172\)).</p>
        <div class="input-group">
            <label>Corrente (A):</label>
            <input type="number" id="i_queda" placeholder="Ex: 32">
        </div>
        <div class="input-group">
            <label>Distância (m):</label>
            <input type="number" id="l_queda" placeholder="Ex: 50">
        </div>
        <div class="input-group">
            <label>Seção do Cabo (mm²):</label>
            <select id="s_queda">
                <option value="1.5">1.5 mm²</option>
                <option value="2.5">2.5 mm²</option>
                <option value="4">4 mm²</option>
                <option value="6">6 mm²</option>
                <option value="10">10 mm²</option>
                <option value="16">16 mm²</option>
            </select>
        </div>
        <button onclick="calcQueda()">Calcular Queda</button>
        <div id="res_queda" class="result"></div>
    </div>

    <div class="calc-card">
        <h2>2. Dimensionamento de Disjuntor</h2>
        <div class="input-group">
            <label>Potência Total (W):</label>
            <input type="number" id="p_disj" placeholder="Ex: 5500">
        </div>
        <div class="input-group">
            <label>Tensão (V):</label>
            <select id="v_disj">
                <option value="220">220V</option>
                <option value="127">127V</option>
                <option value="380">380V</option>
            </select>
        </div>
        <button onclick="calcDisjuntor()">Sugerir Disjuntor</button>
        <div id="res_disj" class="result"></div>
    </div>

    <div class="calc-card">
        <h2>3. Correção de Fator de Potência</h2>
        <div class="input-group">
            <label>Potência Ativa Atual (kW):</label>
            <input type="number" id="kw_fp" placeholder="Ex: 50">
        </div>
        <div class="input-group">
            <label>FP Atual:</label>
            <input type="number" step="0.01" id="fp_atual" placeholder="Ex: 0.80">
        </div>
        <div class="input-group">
            <label>FP Desejado:</label>
            <input type="number" step="0.01" id="fp_desejado" value="0.92">
        </div>
        <button onclick="calcFP()">Calcular Banco (kVAr)</button>
        <div id="res_fp" class="result"></div>
    </div>

    <div class="calc-card">
        <h2>4. Estimativa de Custo (kWh)</h2>
        <div class="input-group">
            <label>Potência do Equipamento (W):</label>
            <input type="number" id="p_custo" placeholder="Ex: 2000">
        </div>
        <div class="input-group">
            <label>Horas de uso/dia:</label>
            <input type="number" id="h_custo" placeholder="Ex: 8">
        </div>
        <div class="input-group">
            <label>Tarifa da Concessionária (R$/kWh):</label>
            <input type="number" step="0.01" id="t_custo" value="0.85">
        </div>
        <button onclick="calcCusto()">Calcular Consumo Mensal</button>
        <div id="res_custo" class="result"></div>
    </div>

    <a href="index.html" class="back-link">← VOLTAR AO TERMINAL PRINCIPAL</a>
</div>

<script>
    function showRes(id, text) {
        const el = document.getElementById(id);
        el.style.display = "block";
        el.innerHTML = text;
    }

    function calcQueda() {
        const I = document.getElementById('i_queda').value;
        const L = document.getElementById('l_queda').value;
        const S = document.getElementById('s_queda').value;
        const quedaV = (2 * 0.0172 * L * I) / S;
        showRes('res_queda', `Queda de Tensão: ${quedaV.toFixed(2)}V`);
    }

    function calcDisjuntor() {
        const P = document.getElementById('p_disj').value;
        const V = document.getElementById('v_disj').value;
        const I = P / V;
        // Lógica simples de mercado (disjuntores comerciais)
        const sugerido = [10, 16, 20, 25, 32, 40, 50, 63, 70, 80, 100];
        const d = sugerido.find(x => x > I * 1.15) || "Consultar Técnico";
        showRes('res_disj', `Corrente: ${I.toFixed(2)}A | Sugestão: Disjuntor ${d}A`);
    }

    function calcFP() {
        const P = document.getElementById('kw_fp').value;
        const f1 = document.getElementById('fp_atual').value;
        const f2 = document.getElementById('fp_desejado').value;
        
        const tang1 = Math.tan(Math.acos(f1));
        const tang2 = Math.tan(Math.acos(f2));
        const kVAr = P * (tang1 - tang2);
        
        showRes('res_fp', `Necessário Banco de: ${kVAr.toFixed(2)} kVAr`);
    }

    function calcCusto() {
        const P = document.getElementById('p_custo').value;
        const H = document.getElementById('h_custo').value;
        const T = document.getElementById('t_custo').value;
        
        const mensalKwh = (P / 1000) * H * 30;
        const valor = mensalKwh * T;
        
        showRes('res_custo', `Consumo: ${mensalKwh.toFixed(2)} kWh/mês | Custo: R$ ${valor.toFixed(2)}`);
    }
</script>

</body>
</html>
