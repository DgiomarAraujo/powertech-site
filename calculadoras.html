<head>

    <style>
        :root {
            --deep-dark: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon-blue: #00d2ff;
            --accent-blue: #0056b3;
            --text-gray: #a0aec0;
            --pure-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #111827, #0a0e14);
            color: var(--pure-white);
            line-height: 1.6;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 20px;
            text-align: center;
        }

        header h1 {
            color: var(--neon-blue);
            font-size: 2.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }

        header p {
            color: var(--text-gray);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* MENU INTEGRADO AO CONTEÚDO (NÃO FLUTUANTE) */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .nav-container a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            transition: all 0.3s ease;
            background: rgba(10, 14, 20, 0.6);
        }

        .nav-container a:hover {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
            background: rgba(0, 210, 255, 0.08);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            color: var(--neon-blue);
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .group { margin-bottom: 14px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: .85rem;
            color: var(--text-gray);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #003366, #0056b3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto;
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--deep-dark);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .result {
            margin-top: 15px;
            background: rgba(0, 210, 255, 0.08);
            color: var(--neon-blue);
            padding: 14px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
            line-height: 1.6;
            border-left: 4px solid var(--neon-blue);
        }

        .back-link {
            display: block;
            text-align: center;
            margin: 50px 0;
            color: var(--text-gray);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--neon-blue); }

        option { background: #1a202c; color: var(--neon-blue); }

        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .nav-container { gap: 8px; }
        }

<body>

<header>
    <h1>POWERTECH INDUSTRIAL</h1>
    <p>Calculadoras Profissionais de Engenharia Elétrica</p>
</header>

<div class="nav-container">
    <a href="index.html">Início</a>
    <a href="dicas.html">Dicas</a>
    <a href="artigos.html">Artigos</a>
    <a href="normas.html">Normas</a>
    <a href="seguranca.html">Segurança</a>
    <a href="sobre.html">Sobre</a>
</div>

<div class="container">
    <div class="grid">
        <div class="card">
            <h2>01. Queda de Tensão</h2>
            <div class="group">
                <label>Corrente (A)</label>
                <input type="number" id="i1">
            </div>
            <div class="group">
                <label>Distância (m)</label>
                <input type="number" id="d1">
            </div>
            <div class="group">
                <label>Bitola (mm²)</label>
                <input type="number" id="s1">
            </div>
            <div class="group">
                <label>Material</label>
                <select id="m1">
                    <option value="0.0172">Cobre</option>
                    <option value="0.0282">Alumínio</option>
                </select>
            </div>
            <div class="group">
                <label>Temperatura</label>
                <select id="t1">
                    <option value="20">20°C</option>
                    <option value="30">30°C</option>
                    <option value="40">40°C</option>
                    <option value="70">70°C</option>
                </select>
            </div>
            <button onclick="calc1()">Calcular</button>
            <div class="result" id="r1"></div>
        </div>

        <div class="card">
            <h2>02. Lei de Ohm</h2>
            <div class="group">
                <label>Tensão (V)</label>
                <input type="number" id="v2">
            </div>
            <div class="group">
                <label>Resistência (Ω)</label>
                <input type="number" id="r2">
            </div>
            <button onclick="calc2()">Calcular</button>
            <div class="result" id="r2_res"></div>
        </div>

        <div class="card">
            <h2>03. Disjuntor Profissional</h2>
            <div class="group">
                <label>Potência (W)</label>
                <input type="number" id="p3">
            </div>
            <div class="group">
                <label>Tensão</label>
                <select id="v3">
                    <option value="127">127V</option>
                    <option value="220">220V</option>
                    <option value="380">380V</option>
                </select>
            </div>
            <div class="group">
                <label>FCA</label>
                <select id="fca3">
                    <option value="1">1.00</option>
                    <option value="0.8">0.80</option>
                    <option value="0.7">0.70</option>
                    <option value="0.65">0.65</option>
                </select>
            </div>
            <div class="group">
                <label>FCT</label>
                <select id="fct3">
                    <option value="1">1.00</option>
                    <option value="0.94">0.94</option>
                    <option value="0.87">0.87</option>
                    <option value="0.79">0.79</option>
                </select>
            </div>
            <button onclick="calc3()">Dimensionar</button>
            <div class="result" id="r3"></div>
        </div>

        <div class="card">
            <h2>04. Banco de Capacitores</h2>
            <div class="group">
                <label>Potência (kW)</label>
                <input type="number" id="p4">
            </div>
            <div class="group">
                <label>FP Atual</label>
                <input type="number" step="0.01" id="fa4">
            </div>
            <div class="group">
                <label>FP Desejado</label>
                <input type="number" step="0.01" id="fd4" value="0.92">
            </div>
            <button onclick="calc4()">Calcular</button>
            <div class="result" id="r4"></div>
        </div>

        <div class="card">
            <h2>05. Potência Trifásica</h2>
            <div class="group">
                <label>Tensão (V)</label>
                <input type="number" id="v6" value="380">
            </div>
            <div class="group">
                <label>Corrente (A)</label>
                <input type="number" id="i6">
            </div>
            <div class="group">
                <label>Fator Potência</label>
                <input type="number" id="fp6" value="0.92" step="0.01">
            </div>
            <button onclick="calc6()">Calcular</button>
            <div class="result" id="r6"></div>
        </div>

        <div class="card">
            <h2>06. Sistema Solar</h2>
            <div class="group">
                <label>Consumo Mensal (kWh)</label>
                <input type="number" id="k8">
            </div>
            <div class="group">
                <label>Horas Sol Pico (HSP)</label>
                <input type="number" id="hsp8" value="5.8">
            </div>
            <div class="group">
                <label>Eficiência Sistema (%)</label>
                <input type="number" id="ef8" value="80">
            </div>
            <button onclick="calc8()">Calcular Placas</button>
            <div class="result" id="r8"></div>
        </div>

        <div class="card">
            <h2>07. Bitola NBR 5410</h2>
            <div class="group">
                <label>Corrente Nominal (A)</label>
                <input type="number" id="i11">
            </div>
            <div class="group">
                <label>FCA</label>
                <select id="fca11">
                    <option value="1">1.00</option>
                    <option value="0.8">0.80</option>
                    <option value="0.7">0.70</option>
                    <option value="0.65">0.65</option>
                </select>
            </div>
            <div class="group">
                <label>FCT</label>
                <select id="fct11">
                    <option value="1">1.00</option>
                    <option value="0.94">0.94</option>
                    <option value="0.87">0.87</option>
                    <option value="0.79">0.79</option>
                </select>
            </div>
            <button onclick="calc11()">Calcular Bitola</button>
            <div class="result" id="r11"></div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Voltar à Página Inicial</a>
</div>

<script>
function mostrar(id,valor){
    let el=document.getElementById(id);
    el.style.display="block";
    el.innerHTML=valor;
}

function invalido(v){
    return isNaN(v) || v<=0;
}

function calc1(){
    const i=parseFloat(document.getElementById('i1').value);
    const d=parseFloat(document.getElementById('d1').value);
    const s=parseFloat(document.getElementById('s1').value);
    const rhoBase=parseFloat(document.getElementById('m1').value);
    const temp=parseFloat(document.getElementById('t1').value);

    if([i,d,s].some(invalido)){
        mostrar("r1","Valores inválidos");
        return;
    }
    const rho=rhoBase*(1+(0.004*(temp-20)));
    const vd=(2*rho*d*i)/s;
    mostrar("r1", `Queda de tensão: ${vd.toFixed(2)} V`);
}

function calc2(){
    const v=parseFloat(document.getElementById('v2').value);
    const r=parseFloat(document.getElementById('r2').value);
    if([v,r].some(invalido)){
        mostrar("r2_res","Valores inválidos");
        return;
    }
    mostrar("r2_res", `Corrente: ${(v/r).toFixed(2)} A`);
}

function calc3(){
    const p=parseFloat(document.getElementById('p3').value);
    const v=parseFloat(document.getElementById('v3').value);
    const fca=parseFloat(document.getElementById('fca3').value);
    const fct=parseFloat(document.getElementById('fct3').value);

    if([p,v].some(invalido)){
        mostrar("r3","Valores inválidos");
        return;
    }
    const ib=p/v;
    const ic=ib/(fca*fct);
    const dj=[10,16,20,25,32,40,50,63,70,80,100,125];
    const sug=dj.find(x=>x>=ic*1.1)||"Acima 125A";
    mostrar("r3", `Ib: ${ib.toFixed(2)} A<br>Corrigida: ${ic.toFixed(2)} A<br><strong>Disjuntor: ${sug} A</strong>`);
}

function calc4(){
    const p=parseFloat(document.getElementById('p4').value);
    const fa=parseFloat(document.getElementById('fa4').value);
    const fd=parseFloat(document.getElementById('fd4').value);
    if([p,fa,fd].some(invalido)){
        mostrar("r4","Valores inválidos");
        return;
    }
    const kvar=p*(Math.tan(Math.acos(fa))-Math.tan(Math.acos(fd)));
    mostrar("r4", `Banco necessário: ${kvar.toFixed(2)} kVAr`);
}

function calc6(){
    const v=parseFloat(document.getElementById('v6').value);
    const i=parseFloat(document.getElementById('i6').value);
    const fp=parseFloat(document.getElementById('fp6').value);
    if([v,i,fp].some(invalido)){
        mostrar("r6","Valores inválidos");
        return;
    }
    const p=1.732*v*i*fp;
    mostrar("r6", `Potência: ${p.toFixed(0)} W`);
}

function calc8(){
    const k=parseFloat(document.getElementById('k8').value);
    const hsp=parseFloat(document.getElementById('hsp8').value);
    const ef=parseFloat(document.getElementById('ef8').value)/100;
    if([k,hsp,ef].some(invalido)){
        mostrar("r8","Valores inválidos");
        return;
    }
    const placa=0.55;
    const qtd=Math.ceil(k/(30*hsp*placa*ef));
    mostrar("r8", `Placas de 550W necessárias: ${qtd}`);
}

function calc11(){
    const i=parseFloat(document.getElementById('i11').value);
    const fca=parseFloat(document.getElementById('fca11').value);
    const fct=parseFloat(document.getElementById('fct11').value);
    if(invalido(i)){
        mostrar("r11","Valor inválido");
        return;
    }
    const ic=i/(fca*fct);
    let cabo="1.5 mm²";
    if(ic>15) cabo="2.5 mm²";
    if(ic>21) cabo="4 mm²";
    if(ic>28) cabo="6 mm²";
    if(ic>36) cabo="10 mm²";
    if(ic>50) cabo="16 mm²";
    if(ic>68) cabo="25 mm²";
    if(ic>89) cabo="35 mm²";
    mostrar("r11", `Corrente Corrigida: ${ic.toFixed(2)} A<br>Cabo recomendado: <strong>${cabo}</strong>`);
}
</script>

</body>
</html>
