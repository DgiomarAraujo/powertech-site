<body>

<header>
    <h1>POWERTECH INDUSTRIAL</h1>
    <p>Calculadoras Profissionais de Engenharia Elétrica</p>
</header>

<div class="nav-container">
    <a href="index.html">Início</a>
    <a href="dicas.html">Dicas</a>
    <a href="artigos.html">Artigos</a>
    <a href="normas.html">Normas</a>
    <a href="seguranca.html">Segurança</a>

<div class="container">
    <div class="grid">
        <div class="card">
            <h2>01. Dimensionamento Solar</h2>
            <div class="group">
                <label>Consumo Médio (kWh/mês)</label>
                <input type="number" id="k8" placeholder="Ex: 500">
            </div>
            <div class="group">
                <label>Horas de Sol Pico (Floriano-PI: 5.8)</label>
                <input type="number" id="hsp8" value="5.8">
            </div>
            <div class="group">
                <label>Perdas do Sistema (%)</label>
                <input type="number" id="ef8" value="20">
            </div>
            <div class="group">
                <label>Potência do Painel (Wp)</label>
                <input type="number" id="wp8" value="550">
            </div>
            <button onclick="calc8()">Gerar Diagnóstico Solar</button>
            <div class="result" id="r8"></div>
        </div>

        <div class="card">
            <h2>02. Queda de Tensão</h2>
            <div class="group">
                <label>Corrente (A)</label>
                <input type="number" id="i1">
            </div>
            <div class="group">
                <label>Distância (m)</label>
                <input type="number" id="d1">
            </div>
            <div class="group">
                <label>Bitola (mm²)</label>
                <input type="number" id="s1">
            </div>
            <div class="group">
                <label>Material</label>
                <select id="m1">
                    <option value="0.0172">Cobre</option>
                    <option value="0.0282">Alumínio</option>
                </select>
            </div>
            <button onclick="calc1()">Calcular</button>
            <div class="result" id="r1"></div>
        </div>

        <div class="card">
            <h2>03. Lei de Ohm</h2>
            <div class="group">
                <label>Tensão (V)</label>
                <input type="number" id="v2">
            </div>
            <div class="group">
                <label>Resistência (Ω)</label>
                <input type="number" id="r2">
            </div>
            <button onclick="calc2()">Calcular</button>
            <div class="result" id="r2_res"></div>
        </div>

        <div class="card">
            <h2>04. Disjuntor (NBR 5410)</h2>
            <div class="group">
                <label>Potência (W)</label>
                <input type="number" id="p3">
            </div>
            <div class="group">
                <label>Tensão (V)</label>
                <select id="v3">
                    <option value="127">127V</option>
                    <option value="220">220V</option>
                </select>
            </div>
            <div class="group">
                <label>FCA (Agrupamento)</label>
                <select id="fca3">
                    <option value="1">1.00 (Solitário)</option>
                    <option value="0.8">0.80 (2 circuitos)</option>
                    <option value="0.7">0.70 (3 circuitos)</option>
                </select>
            </div>
            <button onclick="calc3()">Dimensionar</button>
            <div class="result" id="r3"></div>
        </div>

        <div class="card">
            <h2>05. Banco de Capacitores</h2>
            <div class="group">
                <label>Potência Ativa (kW)</label>
                <input type="number" id="p4">
            </div>
            <div class="group">
                <label>FP Atual</label>
                <input type="number" step="0.01" id="fa4">
            </div>
            <div class="group">
                <label>FP Desejado</label>
                <input type="number" step="0.01" id="fd4" value="0.92">
            </div>
            <button onclick="calc4()">Calcular</button>
            <div class="result" id="r4"></div>
        </div>

        <div class="card">
            <h2>06. Potência Trifásica</h2>
            <div class="group">
                <label>Tensão (V)</label>
                <input type="number" id="v6" value="380">
            </div>
            <div class="group">
                <label>Corrente (A)</label>
                <input type="number" id="i6">
            </div>
            <div class="group">
                <label>Fator Potência</label>
                <input type="number" id="fp6" value="0.92" step="0.01">
            </div>
            <button onclick="calc6()">Calcular</button>
            <div class="result" id="r6"></div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Voltar à Página Inicial</a>
</div>

<script>
function mostrar(id,valor){
    let el=document.getElementById(id);
    el.style.display="block";
    el.innerHTML=valor;
}

function invalido(v){ return isNaN(v) || v<=0; }

// LOGICA SOLAR MELHORADA
function calc8(){
    const consumo = parseFloat(document.getElementById('k8').value);
    const hsp = parseFloat(document.getElementById('hsp8').value);
    const perdas = parseFloat(document.getElementById('ef8').value) / 100;
    const wpPainel = parseFloat(document.getElementById('wp8').value);
    
    if(invalido(consumo) || hsp <= 0) {
        mostrar("r8", "⚠️ Informe o consumo mensal.");
        return;
    }

    // Cálculo da Potência do Sistema (kWp)
    // Formula: P (kWp) = Consumo / (30 dias * HSP * Eficiência)
    const eficiencia = 1 - perdas;
    const kwp = consumo / (30 * hsp * eficiencia);
    
    // Quantidade de painéis
    const qtd = Math.ceil((kwp * 1000) / wpPainel);
    
    // Área aproximada (cada painel de 550W tem ~2.6m²)
    const area = qtd * 2.6;

    mostrar("r8", 
        `⚡ <b>Diagnóstico PowerTech:</b><br>` +
        `• Sistema Sugerido: <b>On-Grid</b><br>` +
        `• Potência Total: <b>${kwp.toFixed(2)} kWp</b><br>` +
        `• Painéis (${wpPainel}W): <b>${qtd} un</b><br>` +
        `• Área Necessária: <b>~${area.toFixed(1)} m²</b><br>` +
        `• Geração Estimada: <b>${consumo} kWh/mês</b>`
    );
}

function calc1(){
    const i=parseFloat(document.getElementById('i1').value);
    const d=parseFloat(document.getElementById('d1').value);
    const s=parseFloat(document.getElementById('s1').value);
    const rho=parseFloat(document.getElementById('m1').value);
    if([i,d,s].some(invalido)){ mostrar("r1","Valores inválidos"); return; }
    const vd=(2*rho*d*i)/s;
    mostrar("r1", `Queda de tensão: ${vd.toFixed(2)} V`);
}

function calc2(){
    const v=parseFloat(document.getElementById('v2').value);
    const r=parseFloat(document.getElementById('r2').value);
    if([v,r].some(invalido)){ mostrar("r2_res","Valores inválidos"); return; }
    mostrar("r2_res", `Corrente: ${(v/r).toFixed(2)} A`);
}

function calc3(){
    const p=parseFloat(document.getElementById('p3').value);
    const v=parseFloat(document.getElementById('v3').value);
    const fca=parseFloat(document.getElementById('fca3').value);
    if([p,v].some(invalido)){ mostrar("r3","Valores inválidos"); return; }
    const ib=p/v;
    const ic=ib/fca;
    const dj=[10,16,20,25,32,40,50,63,70,80,100,125];
    const sug=dj.find(x=>x>=ic*1.1)||"Consultar Engenharia";
    mostrar("r3", `Ib: ${ib.toFixed(1)}A | Ic: ${ic.toFixed(1)}A<br><b>Sugestão: Disjuntor ${sug}A</b>`);
}

function calc4(){
    const p=parseFloat(document.getElementById('p4').value);
    const fa=parseFloat(document.getElementById('fa4').value);
    const fd=parseFloat(document.getElementById('fd4').value);
    if([p,fa,fd].some(invalido)){ mostrar("r4","Valores inválidos"); return; }
    const kvar=p*(Math.tan(Math.acos(fa))-Math.tan(Math.acos(fd)));
    mostrar("r4", `Banco necessário: ${kvar.toFixed(2)} kVAr`);
}

function calc6(){
    const v=parseFloat(document.getElementById('v6').value);
    const i=parseFloat(document.getElementById('i6').value);
    const fp=parseFloat(document.getElementById('fp6').value);
    if([v,i,fp].some(invalido)){ mostrar("r6","Valores inválidos"); return; }
    const p=1.732*v*i*fp;
    mostrar("r6", `Potência: ${p.toFixed(0)} W`);
}
</script>

</body>
